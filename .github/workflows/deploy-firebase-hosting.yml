name: Deploy Firebase Hosting

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "firebase-hosting-prod"
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      REQUIRE_FIREBASE_CONFIG: "true"
      FIREBASE_CONFIG_DEV_JSON: ${{ secrets.FIREBASE_CONFIG_DEV_JSON }}
      FIREBASE_CONFIG_PROD_JSON: ${{ secrets.FIREBASE_CONFIG_PROD_JSON }}
      FIREBASE_ENV_HOSTS_DEV: ${{ secrets.FIREBASE_ENV_HOSTS_DEV }}
      FIREBASE_ENV_HOSTS_PROD: ${{ secrets.FIREBASE_ENV_HOSTS_PROD }}
      FIREBASE_SERVICE_ACCOUNT_TASK_CHECKLIST_PROD: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TASK_CHECKLIST_PROD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Prepare deployment artifact
        run: npm run build:hosting

      - name: Write Firebase service account
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_TASK_CHECKLIST_PROD" > "$RUNNER_TEMP/firebase-service-account.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-service-account.json" >> "$GITHUB_ENV"

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting --project task-checklist-prod --non-interactive
